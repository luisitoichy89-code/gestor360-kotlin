name: Build Kotlin APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK with credentials (clean cache)
        run: ./gradlew clean assembleDebug --refresh-dependencies --no-build-cache -PSUPABASE_URL=${{ secrets.SUPABASE_URL }} -PSUPABASE_KEY=${{ secrets.SUPABASE_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
