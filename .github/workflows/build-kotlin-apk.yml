name: Build Kotlin APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Supabase credentials
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> gradle.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> gradle.properties

      - name: Build Debug APK
        # Añadidos --stacktrace e --info para que KAPT muestre el error exacto
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
