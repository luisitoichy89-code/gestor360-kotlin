name: Build Gestor360 Kotlin APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Gradle (genera el wrapper automáticamente)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Inyectar credenciales de Supabase (desde GitHub Secrets)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> gradle.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> gradle.properties

      - name: Compilar APK (debug)
        run: gradle assembleDebug --stacktrace

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-kotlin-apk
          path: app/build/outputs/apk/debug/app-debug.apk
